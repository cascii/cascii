name: Manual Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to release"
        required: true
        default: "master"
      version:
        description: "Semver to release. Leave blank to use Cargo.toml"
        required: false
        default: ""
      move_existing_tag:
        description: "Move vX.Y.Z if it already exists"
        required: true
        type: boolean
        default: false
      publish_crate:
        description: "Publish this version to crates.io"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | cut -d'"' -f2)
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="$CARGO_VERSION"
          fi
          if [ "$VERSION" != "$CARGO_VERSION" ]; then
            echo "Input version $VERSION does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Preparing v$VERSION from ${{ inputs.ref }}"

      - name: Create or update tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            if [ "${{ inputs.move_existing_tag }}" != "true" ]; then
              echo "Tag $TAG already exists. Enable move_existing_tag to repoint it."
            else
              git tag -fa "$TAG" -m "Release $TAG"
              git push --force origin "$TAG"
            fi
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Build release notes
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          {
            echo "Manual release $TAG"
            echo
            echo "Ref: ${{ inputs.ref }}"
            echo "Commit: $GITHUB_SHA"
            echo
            git log -1 --pretty=%B
          } > release_notes.txt

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "Release $TAG" \
              --notes-file release_notes.txt \
              --latest
          else
            gh release create "$TAG" \
              --title "Release $TAG" \
              --notes-file release_notes.txt \
              --latest
          fi

  build-and-upload:
    name: Build and Upload
    runs-on: ${{ matrix.os }}
    needs: prepare-release
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: cascii
            asset_name: cascii-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: cascii
            asset_name: cascii-macos-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: cascii
            asset_name: cascii-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: cascii
            asset_name: cascii-linux-arm64

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure Cargo for cross-compilation
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << EOF
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ matrix.asset_name }}.tar.gz ${{ matrix.artifact_name }}
          mv ${{ matrix.asset_name }}.tar.gz "${{ github.workspace }}"

      - name: Upload asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.prepare-release.outputs.tag }}" \
            "${{ matrix.asset_name }}.tar.gz" \
            --clobber

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: prepare-release
    if: ${{ inputs.publish_crate }}

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
